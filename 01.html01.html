<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 01 - tag를 알아보자.</title>

    <style>
        /* * [ Block 요소 - div ] 
         * div는 대표적인 '블록(박스)' 형태의 태그입니다.
         * 기본적으로 가로 전체(100%)를 차지하며, 블록처럼 위에서 아래로 차곡차곡 쌓입니다.
         */
        div {
            background: #f00;
            /* 배경색을 빨간색(red)으로 설정합니다. */
            width: 400px;
            /* 박스의 가로 너비를 400px로 고정합니다. (크기 지정 가능!) */
            height: 400px;
            /* 박스의 세로 높이를 400px로 고정합니다. */

            margin-top: 40px;
            /* 박스 바깥쪽 위 여백을 40px 줍니다. (다른 요소와 벌어짐) */
            margin-bottom: 40px;
            /* 박스 바깥쪽 아래 여백을 40px 줍니다. */

            padding-left: 40px;
            /* 박스 안쪽 왼쪽 여백을 40px 줍니다. (글씨와 테두리 사이 간격) */
            padding-right: 40px;
            /* 박스 안쪽 오른쪽 여백을 40px 줍니다. */

            border: 1px solid #333;
            /* 박스 테두리에 1px 두께의 짙은 회색 실선을 그립니다. */
        }

        /* * [ Inline 요소 - span, a ]
         * span과 a는 대표적인 '인라인(글자)' 형태의 태그입니다.
         * 글자 크기만큼만 자리를 차지하며, 옆으로 나란히 이어집니다.
         */
        span,
        a {
            background: #ff0;
            /* 배경색을 노란색(yellow)으로 설정합니다. */

            /* [주의] 인라인 요소는 박스가 아니기 때문에 width와 height 값이 무시됩니다! */
            width: 400px;
            height: 400px;

            /* [주의] 인라인 요소에는 위아래 바깥 여백(margin-top/bottom)이 들어가지 않습니다! */
            margin-top: 40px;
            margin-bottom: 40px;

            /* 하지만 좌우 여백(margin, padding)은 정상적으로 잘 들어갑니다. */
            padding-left: 40px;
            padding-right: 40px;

            /* * [정확한 사실] 
             * 인라인 요소에 위아래 패딩(padding)을 주면 시각적으로 색칠은 커지게 나옵니다.
             * 하지만 진짜 박스가 커진 게 아니라서, 주변 줄들을 밀어내지 못하고 다른 글자 위로 겹쳐버립니다.
             * (즉, 레이아웃 공간을 차지하지 않습니다.)
             */
            padding-top: 40px;
            padding-bottom: 40px;
        }
    </style>
</head>

<body>
    <div>box</div>
    <div>box</div>

    <span>inline</span>
    <span>inline</span>
    <a href="">inline</a>
</body>

</html>
