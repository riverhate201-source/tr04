<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 02 - block tag를 알아보자.</title>
</head>

<body>
    <!-- 실제 웹페이지에 보이는 모든 내용이 들어가는 영역 -->

    <!-- box tag (블록 요소들을 의미, 한 줄 전체를 차지하는 태그들) -->

    <!-- heading tag (제목 태그, 숫자가 작을수록 중요도가 높음) -->
    <h1>Lorem ipsum dolor sit.</h1>
    <!-- 가장 중요한 제목 (페이지당 보통 1개 사용) -->

    <h2>Lorem ipsum dolor sit.</h2>
    <!-- h1 다음으로 중요한 제목 -->

    <h3>Lorem ipsum dolor sit.</h3>
    <!-- 중간 단계 제목 -->

    <h4>Lorem ipsum dolor sit.</h4>
    <!-- 하위 제목 -->

    <h5>Lorem ipsum dolor sit.</h5>
    <!-- 더 작은 제목 -->

    <h6>Lorem ipsum dolor sit.</h6>
    <!-- 가장 낮은 단계 제목 -->

    <!-- 문단을 나타내는 태그 -->
    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Aspernatur in repellendus sunt?
    </p>
    <!-- 하나의 문단(텍스트 덩어리)을 표현 -->

    <!-- 의미 없는 블록 컨테이너 (스타일이나 구조를 묶을 때 사용) -->
    <div class="txt">
        Lorem ipsum dolor sit.
    </div>

    <!-- 시맨틱 태그 (의미를 가진 레이아웃 태그들) -->

    <header>
        header
    </header>
    <!-- 페이지 또는 섹션의 머리말 (로고, 메뉴 등 포함) -->

    <main>
        main
    </main>
    <!-- 페이지의 핵심 콘텐츠 영역 (중복되지 않는 주요 내용) -->

    <footer>
        footer
    </footer>
    <!-- 페이지의 바닥글 (저작권, 연락처 등) -->

    <section>
        section
    </section>
    <!-- 주제별로 콘텐츠를 나누는 구역 -->

    <article>
        article
    </article>
    <!-- 독립적으로 재사용 가능한 콘텐츠 (블로그 글, 뉴스 기사 등) -->

    <aside>
        aside
    </aside>
    <!-- 보조 콘텐츠 (광고, 사이드바 등) -->

    <!-- 이미지 + 설명을 함께 묶는 태그 -->
    <figure>
        figure
    </figure>
    <!-- 이미지, 도표, 코드 등을 설명과 함께 그룹화할 때 사용 -->

</body>

</html>
