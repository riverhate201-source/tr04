<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 03 - inline tag를 알아보자.</title>
</head>

<body>
    <!-- 실제 화면에 표시되는 콘텐츠 영역 -->

    <!-- span 태그: 대표적인 inline 태그 (의미 없음, 스타일 적용용) -->
    <span>Lorem ipsum dolor sit.</span>
    <!-- 줄바꿈 없이 특정 텍스트 영역을 묶을 때 사용 -->

    <!-- strong 태그: 중요한 내용 강조 (의미 강조 + 굵게 표시) -->
    <strong>Lorem ipsum dolor sit.</strong>
    <!-- 스크린 리더가 중요하게 읽음 (접근성 중요) -->

    <!-- b 태그: 단순히 굵게 표시 (의미 없음) -->
    <b>Lorem ipsum dolor sit.</b>
    <!-- 시각적인 강조만, 의미적 중요도 없음 -->

    <!-- em 태그: 강조 (기울임 + 의미 강조) -->
    <em>Lorem ipsum dolor sit.</em>
    <!-- 문장에서 강조되는 부분 (스크린 리더가 강조해서 읽음) -->

    <!-- i 태그: 단순 기울임 -->
    <i>Lorem ipsum dolor sit.</i>
    <!-- 디자인용 기울임 (의미 없음) -->

    <!-- a 태그: 하이퍼링크 -->
    <a href="">
        Lorem ipsum dolor sit.
    </a>
    <!-- 클릭 시 다른 페이지로 이동 -->
    <!-- href 속성에 이동할 URL을 넣음 -->

    <!-- inline 태그 특징 정리 -->
    <!-- 1. 줄바꿈이 일어나지 않음 -->
    <!-- 2. 콘텐츠 크기만큼만 영역 차지 -->
    <!-- 3. width, height 적용이 제한적 -->

</body>

</html>
